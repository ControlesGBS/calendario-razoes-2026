<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Mensal 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: #eef2f7;
    min-height: 100vh;
    padding: 24px 16px;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
  }

  /* CARD */
  .card {
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #c0cfe0;
    background: #fff;
  }

  /* CABEÇALHO PRINCIPAL */
  .main-header {
    background: #0f2744;
    padding: 0;
    display: grid;
    grid-template-columns: 200px 1fr 200px;
    align-items: center;
    min-height: 90px;
  }

  .logo-area {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }

  .logo-area img {
    max-height: 60px;
    max-width: 170px;
    object-fit: contain;
  }

  .logo-placeholder {
    width: 160px;
    height: 52px;
    border: 2px dashed rgba(255,255,255,0.25);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    font-family: 'Barlow', sans-serif;
    letter-spacing: .04em;
    text-align: center;
    line-height: 1.4;
  }

  .title-area {
    text-align: center;
    padding: 16px 8px;
  }

  .title-area h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: .06em;
    text-transform: uppercase;
    line-height: 1.1;
  }

  .nav-area {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
  }

  .nav-btn {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.28);
    color: #fff;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    transition: background .15s;
    flex-shrink: 0;
  }

  .nav-btn:hover { background: rgba(255,255,255,0.25); }
  .nav-btn:disabled { opacity: .35; cursor: not-allowed; }

  .nav-btn svg {
    width: 18px;
    height: 18px;
    stroke: #fff;
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .nav-month {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    min-width: 110px;
    text-align: center;
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  /* CABEÇALHO DA TABELA */
  .tbl-header {
    display: grid;
    grid-template-columns: 110px 60px 100px 1fr 1fr 1fr;
    background: #1a3a5c;
    border-bottom: 2px solid #2a4f70;
  }

  .tbl-header div {
    padding: 11px 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: .07em;
    text-align: center;
    border-right: 1px solid #2a4f70;
  }

  .tbl-header div:last-child { border-right: none; }

  /* LINHAS */
  .tbl-body { }

  .row {
    display: grid;
    grid-template-columns: 110px 60px 100px 1fr 1fr 1fr;
    border-bottom: 1px solid #dde4ed;
  }

  .row:last-child { border-bottom: none; }

  .row.even .cell { background: #ffffff; }
  .row.odd  .cell { background: #f4f7fb; }
  .row.sunday .cell { background: #ede9e3; }
  .row.sunday .cell { color: #aaa; }

  .row.today .cell { background: #d0ead8 !important; }
  .row.today .day-n { color: #155c2a !important; }
  .row.today .day-lbl { color: #1e7a3a !important; }

  .row.holiday .cell { background: #fff0f0; }
  .row.holiday .day-n { color: #c0392b; }
  .row.holiday .day-lbl { color: #c0392b; }
  .row.holiday .mes-lbl { color: #c0392b; }
  .feriado-lbl { font-size: 11px; color: #c0392b; font-weight: 600; font-family: 'Barlow', sans-serif; letter-spacing: .03em; white-space: nowrap; }

  .cell {
    padding: 8px 7px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 3px;
    border-right: 1px solid #dde4ed;
    vertical-align: middle;
    min-height: 38px;
  }

  .cell:last-child { border-right: none; }

  .cell.left { justify-content: flex-start; padding-left: 12px; }

  .day-n {
    font-size: 15px;
    font-weight: 600;
    color: #1a2e44;
    font-family: 'Barlow', sans-serif;
  }

  .day-lbl {
    font-size: 13px;
    color: #1a2e44;
    font-family: 'Barlow', sans-serif;
    font-weight: 700;
  }

  .mes-lbl {
    font-size: 13px;
    color: #1a2e44;
    font-family: 'Barlow', sans-serif;
    font-weight: 700;
  }

  /* BADGES */
  .rb {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .03em;
    white-space: nowrap;
    font-family: 'Barlow', sans-serif;
  }

  .rl { background: #1a5fa5; color: #fff; }
  .rc { background: #4a35b5; color: #fff; }
  .rr { background: #0e7a4a; color: #fff; }

  .dash {
    color: #c0c8d0;
    letter-spacing: 3px;
    font-size: 13px;
  }

  /* LEGENDA */
  .legend {
    background: #f4f7fb;
    border-top: 1px solid #dde4ed;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: #4a5a70;
    font-family: 'Barlow', sans-serif;
  }

  .legend-dot {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-title {
    font-size: 11px;
    color: #8a9ab0;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-right: 4px;
  }
</style>
</head>
<style>
  #login-screen {
    position: fixed; inset: 0; background: #0f2744;
    display: flex; align-items: center; justify-content: center; z-index: 9999;
  }
  .login-box {
    background: #1a3a5c; border-radius: 16px; padding: 40px 48px;
    display: flex; flex-direction: column; align-items: center; gap: 24px;
    border: 1px solid #2a4f70; min-width: 320px;
  }
  .login-box img { max-height: 64px; max-width: 200px; object-fit: contain; }
  .login-box h2 { color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; margin: 0; }
  .login-box p { color: rgba(255,255,255,0.5); font-size: 13px; margin: 0; text-align: center; }
  .login-input {
    width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #2a4f70;
    background: #0f2744; color: #fff; font-size: 15px; font-family: 'Barlow', sans-serif;
    text-align: center; letter-spacing: .1em; outline: none;
  }
  .login-input:focus { border-color: #5bc4f5; }
  .login-btn {
    width: 100%; padding: 12px; border-radius: 8px; border: none;
    background: #185FA5; color: #fff; font-size: 14px; font-weight: 600;
    font-family: 'Barlow', sans-serif; cursor: pointer; letter-spacing: .04em; text-transform: uppercase;
  }
  .login-btn:hover { background: #1a6fb5; }
  .login-error { color: #e74c3c; font-size: 12px; display: none; }
</style>

<div id="login-screen">
  <div class="login-box">
    <img src="logo_exata-removebg-preview.png" alt="Logo">
    <h2>Calendário Mensal 2026</h2>
    <p>Digite a senha para acessar</p>
    <input class="login-input" type="password" id="senha-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checarSenha()">
    <span class="login-error" id="login-erro">Senha incorreta. Tente novamente.</span>
    <button class="login-btn" onclick="checarSenha()">Entrar</button>
  </div>
</div>

<body>
<div class="container">
  <div class="card">

    <!-- CABEÇALHO PRINCIPAL -->
    <div class="main-header">
      <div class="logo-area">
        <!-- Substitua o src pelo caminho da sua logo PNG -->
        <img src="logo_exata-removebg-preview.png" alt="Logo">
      </div>
      <div class="title-area">
        <h1>Calendário Mensal 2026</h1>
      </div>
      <div class="nav-area">
        <button class="nav-btn" id="btn-prev" onclick="nav(-1)" aria-label="Mês anterior">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <div class="nav-month" id="nav-label">Maio 2026</div>
        <button class="nav-btn" id="btn-next" onclick="nav(1)" aria-label="Próximo mês">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
      </div>
    </div>

    <!-- CABEÇALHO DA TABELA -->
    <div class="tbl-header">
      <div>Mês</div>
      <div>Data</div>
      <div>Dia</div>
      <div>Leitura e Transmissão</div>
      <div>Limite de Consistência</div>
      <div>Limite de Atraso Rural</div>
    </div>

    <!-- CORPO -->
    <div class="tbl-body" id="tbl-body"></div>

    <!-- LEGENDA -->
    <div class="legend">
      <span class="legend-title">Legenda:</span>
      <div class="legend-item"><span class="legend-dot" style="background:#1a5fa5"></span>Leitura e Transmissão</div>
      <div class="legend-item"><span class="legend-dot" style="background:#4a35b5"></span>Limite de Consistência</div>
      <div class="legend-item"><span class="legend-dot" style="background:#0e7a4a"></span>Limite de Atraso Rural</div>
      <div class="legend-item"><span class="legend-dot" style="background:#d0ead8;border:1px solid #1e7a3a"></span>Dia atual</div>
    </div>

  </div>
</div>

<script>
const MN = ['Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DN = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

const CAL = {
  Maio:     {y:2026,m:4, r:[[1,7],[2,8],[3,9],[4,11],[5,12],[6,13],[7,14],[8,15],[9,16],[10,18],[11,19],[12,20],[13,21],[14,22],[15,25],[16,26],[17,27],[18,29]]},
  Junho:    {y:2026,m:5, r:[[1,8],[2,9],[3,10],[4,11],[5,12],[6,13],[7,15],[8,16],[9,17],[10,18],[11,19],[12,22],[13,23],[14,24],[15,25],[16,26],[17,29],[18,30]]},
  Julho:    {y:2026,m:6, r:[[1,8],[2,9],[3,10],[4,13],[5,14],[6,15],[7,16],[8,17],[9,20],[10,21],[11,22],[12,23],[13,24],[14,27],[15,28],[16,29],[17,30],[18,31]]},
  Agosto:   {y:2026,m:7, r:[[1,7],[2,10],[3,11],[4,12],[5,13],[6,14],[7,17],[8,18],[9,19],[10,20],[11,21],[12,24],[13,25],[14,26],[15,27],[16,28],[17,29],[18,31]]},
  Setembro: {y:2026,m:8, r:[[1,8],[2,9],[3,10],[4,11],[5,14],[6,15],[7,16],[8,17],[9,18],[10,21],[11,22],[12,23],[13,24],[14,25],[15,26],[16,28],[17,29],[18,30]]},
  Outubro:  {y:2026,m:9, r:[[1,7],[2,8],[3,9],[4,13],[5,14],[6,15],[7,16],[8,19],[9,20],[10,21],[11,22],[12,23],[13,24],[14,26],[15,27],[16,28],[17,29],[18,30]]},
  Novembro: {y:2026,m:10,r:[[1,5],[2,6],[3,9],[4,10],[5,11],[6,12],[7,13],[8,16],[9,17],[10,18],[11,19],[12,23],[13,24],[14,25],[15,26],[16,27],[17,28],[18,30]]},
  Dezembro: {y:2026,m:11,r:[[1,7],[2,9],[3,10],[4,11],[5,12],[6,14],[7,15],[8,16],[9,17],[10,18],[11,19],[12,21],[13,22],[14,23],[15,28],[16,29],[17,30],[18,31]]}
};

let idx = 0;

const FERIADOS = {
  '2026-6-4':  'Corpus Christi',
  '2026-9-7':  'Independência do Brasil',
  '2026-10-12':'N. S. Aparecida',
  '2026-11-2': 'Finados',
  '2026-11-20':'Consciência Negra',
  '2026-12-25':'Natal'
};

function addBiz(date, n, lset) {
  let d = new Date(date), a = 0;
  while (a < n) {
    d.setDate(d.getDate() + 1);
    const w = d.getDay();
    if (w === 0) continue;
    const fk = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    if (FERIADOS[fk]) continue;
    a++;
  }
  return d;
}

function p2(n) { return String(n).padStart(2, '0'); }

function render() {
  const name = MN[idx];
  const { y, m, r } = CAL[name];

  document.getElementById('nav-label').textContent = name + ' 2026';
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === MN.length - 1;

  const lset = new Set(r.map(x => x[1]));
  const byDay = {};

  const addToByDay = (date, col, n) => {
    if (date.getFullYear() === y && date.getMonth() === m) {
      const k = date.getDate();
      if (!byDay[k]) byDay[k] = { L:[], C:[], R:[] };
      byDay[k][col].push(n);
    }
  };

  r.forEach(([n, ld]) => {
    const lDate = new Date(y, m, ld);
    const cDate = addBiz(lDate, 2, lset);
    const rDate = addBiz(lDate, 5, lset);
    addToByDay(lDate, 'L', n);
    addToByDay(cDate, 'C', n);
    addToByDay(rDate, 'R', n);
  });

  if (idx > 0) {
    const prevName = MN[idx - 1];
    const prev = CAL[prevName];
    const prevLset = new Set(prev.r.map(x => x[1]));
    prev.r.forEach(([n, ld]) => {
      const lDate = new Date(prev.y, prev.m, ld);
      const cDate = addBiz(lDate, 2, prevLset);
      const rDate = addBiz(lDate, 5, prevLset);
      addToByDay(cDate, 'C', n);
      addToByDay(rDate, 'R', n);
    });
  }

  const dim = new Date(y, m + 1, 0).getDate();
  const today = new Date();
  let html = '';
  let rowCount = 0;

  for (let d = 1; d <= dim; d++) {
    const dt = new Date(y, m, d);
    const wd = dt.getDay();
    const isSun = wd === 0;
    const isTod = today.getFullYear() === y && today.getMonth() === m && today.getDate() === d;
    const feriadoKey = `${y}-${m+1}-${d}`;
    const feriadoNome = FERIADOS[feriadoKey] || null;
    const info = byDay[d] || { L:[], C:[], R:[] };

    let rowClass = 'row';
    if (isTod) rowClass += ' today';
    else if (isSun) rowClass += ' sunday';
    else if (feriadoNome) rowClass += ' holiday';
    else { rowClass += rowCount % 2 === 0 ? ' even' : ' odd'; }
    if (!isSun) rowCount++;

    const lc = isSun ? `<span class="dash">— — — — —</span>` : info.L.map(n => `<span class="rb rl">RAZÃO ${p2(n)}</span>`).join('');
    const cc = isSun ? `<span class="dash">— — — — —</span>` : info.C.map(n => `<span class="rb rc">RAZÃO ${p2(n)}</span>`).join('');
    const rc = isSun ? `<span class="dash">— — — — —</span>` : info.R.map(n => `<span class="rb rr">RAZÃO ${p2(n)}</span>`).join('');
    const feriadoTag = feriadoNome ? `<span class="feriado-lbl">🔴 ${feriadoNome}</span>` : '';

    html += `<div class="${rowClass}">
      <div class="cell" style="justify-content:center"><span class="mes-lbl">${name}</span></div>
      <div class="cell"><span class="day-n">${d}</span></div>
      <div class="cell"><span class="day-lbl">${DN[wd]}</span></div>
      <div class="cell">${lc || feriadoTag}</div>
      <div class="cell">${cc}</div>
      <div class="cell">${rc}</div>
    </div>`;
  }

  document.getElementById('tbl-body').innerHTML = html;
}

function nav(d) {
  idx = Math.max(0, Math.min(MN.length - 1, idx + d));
  render();
}

function checarSenha() {
  const SENHA = 'exata2026';
  const val = document.getElementById('senha-input').value;
  if (val === SENHA) {
    document.getElementById('login-screen').style.display = 'none';
  } else {
    document.getElementById('login-erro').style.display = 'block';
    document.getElementById('senha-input').value = '';
    document.getElementById('senha-input').focus();
  }
}

render();
</script>
</body>
</html>
